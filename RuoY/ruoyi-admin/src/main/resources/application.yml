# 项目相关配置
ruoyi:
  # 名称
  name: 体系协同多源识别算法优化软件
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例
  profile: /home/hyy1208

  # 备份目录
  backupDir: /home/hyy1208/backupdata
  #备份还原目录
  backAndRestore: /home/hyy1208/BackupRestore
  #项目所在路径
  projectPath: /home/hyy1208/xidianProject/xd_project/xidianProject/DateCreate
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

  # 审计日志空间告警阈值（MB）
  thresholdMb: 5000

# 开发环境配置
server:
  # 服务器的HTTP端口
  port: 8081
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    max-swallow-size: -1
    max-http-form-post-size: -1
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # RabbitMQ 配置
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
      # 强烈建议开启手动确认，保证消息不丢失
    listener:
      simple:
        acknowledge-mode: manual
    connection-timeout: 1s # 连接超时时间
    template:
      retry:
        max-attempts: 3

        enabled: true
        initial-interval: 1s
        multiplier: 2 # 重试间隔倍数
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 20GB
      # 设置总上传的文件大小
      max-request-size: 100GB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false
  # redis 配置
  redis:
    # 地址 需修改为服务器端口地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期
  expireTime: 60

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*
# 第三方API配置,需更换为自己的api
third-api:
  amap:
    key: "123456789"
    # 高德行政区域查询接口
    district-url: "https://restapi.amap.com/v3/config/district"
simulation:
  python:
    api-base-url: ${SIMULATION_PYTHON_API_BASE_URL:http://127.0.0.1:5000}
    api-connect-timeout-seconds: ${SIMULATION_PYTHON_API_CONNECT_TIMEOUT_SECONDS:10}
    api-read-timeout-seconds: ${SIMULATION_PYTHON_API_READ_TIMEOUT_SECONDS:600}
    api-task-timeout-seconds: ${SIMULATION_PYTHON_API_TASK_TIMEOUT_SECONDS:600}
    api-poll-interval-millis: ${SIMULATION_PYTHON_API_POLL_INTERVAL_MILLIS:500}
    local-data-root: ${SIMULATION_PYTHON_LOCAL_DATA_ROOT:${ruoyi.profile}/data}
    output-base-dir: ${SIMULATION_PYTHON_OUTPUT_BASE_DIR:${ruoyi.profile}/data}
    default-output-directory: ${SIMULATION_PYTHON_DEFAULT_OUTPUT_DIRECTORY:csv_output/api_requests}
